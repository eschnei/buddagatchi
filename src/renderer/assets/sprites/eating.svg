<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Goose body -->
  <ellipse cx="60" cy="75" rx="35" ry="28" fill="#F5F0E8" />
  <ellipse cx="60" cy="78" rx="32" ry="24" fill="#EDE8DC" />
  <!-- Wings -->
  <ellipse cx="38" cy="72" rx="14" ry="20" fill="#E8E0D0" transform="rotate(-10 38 72)" />
  <ellipse cx="82" cy="72" rx="14" ry="20" fill="#E8E0D0" transform="rotate(10 82 72)" />
  <!-- Neck bent down -->
  <path d="M55 55 Q40 40 35 30" stroke="#F5F0E8" stroke-width="14" fill="none" stroke-linecap="round" />
  <path d="M55 55 Q40 40 35 30" stroke="#EDE8DC" stroke-width="10" fill="none" stroke-linecap="round" />
  <!-- Head -->
  <circle cx="33" cy="28" r="12" fill="#F5F0E8" />
  <!-- Beak wide open -->
  <path d="M38 24 L52 20 L40 27 Z" fill="#F4A030" />
  <path d="M38 30 L50 34 L40 32 Z" fill="#E8912A" />
  <!-- Eager eye -->
  <circle cx="28" cy="24" r="3.5" fill="#1a1a2e" />
  <circle cx="29" cy="23" r="1.2" fill="white" />
  <!-- Crumbs -->
  <circle cx="45" cy="38" r="2" fill="#8B7355" />
  <circle cx="50" cy="42" r="1.5" fill="#8B7355" />
  <circle cx="42" cy="44" r="1.8" fill="#8B7355" />
  <!-- Feet -->
  <path d="M45 100 L35 108 L45 105 L40 112 L50 105 L45 100" fill="#F4A030" />
  <path d="M75 100 L65 108 L75 105 L70 112 L80 105 L75 100" fill="#F4A030" />
</svg>
