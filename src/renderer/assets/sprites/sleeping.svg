  <ellipse cx="40" cy="76" rx="12" ry="18" fill="#E8E0D0" transform="rotate(-5 40 76)" />
  <ellipse cx="80" cy="76" rx="12" ry="18" fill="#E8E0D0" transform="rotate(5 80 76)" />
  <!-- Neck tucked -->
  <path d="M55 60 Q50 50 55 45" stroke="#F5F0E8" stroke-width="14" fill="none" stroke-linecap="round" />
