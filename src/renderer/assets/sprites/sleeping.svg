  <!-- Zzz -->
  <text x="75" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#87CEEB" opacity="0.7">z</text>
  <text x="85" y="16" font-family="sans-serif" font-size="11" font-weight="bold" fill="#87CEEB" opacity="0.5">z</text>
  <text x="92" y="10" font-family="sans-serif" font-size="8" font-weight="bold" fill="#87CEEB" opacity="0.3">z</text>
  <!-- Feet tucked -->
