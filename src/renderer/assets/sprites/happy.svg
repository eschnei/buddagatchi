  <!-- Rosy cheeks -->
  <circle cx="46" cy="13" r="3" fill="#FFB5B5" opacity="0.5" />
  <!-- Feet -->
  <path d="M45 100 L35 108 L45 105 L40 112 L50 105 L45 100" fill="#F4A030" />
  <path d="M75 100 L65 108 L75 105 L70 112 L80 105 L75 100" fill="#F4A030" />
